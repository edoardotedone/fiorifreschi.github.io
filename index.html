<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiori Freschi Poster Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script>
      // Fetch and inline Google Fonts CSS to ensure html-to-image can read the @font-face rules
      // without running into cross-origin stylesheet restrictions when deployed on GitHub Pages.
      fetch('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap')
        .then(res => res.text())
        .then(css => {
          const style = document.createElement('style');
          style.textContent = css;
          document.head.appendChild(style);
        })
        .catch(err => console.error('Failed to load fonts:', err));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
